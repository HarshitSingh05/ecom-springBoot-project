<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
        th:replace="~{base::layout(~{::section})}">
<head>
    <title>Welcome Page</title>
</head>
<body>
	<section>
		<div class="container mt-5 p-5">
			<form action="/user/save-order" method="post">
					<div class="row">
						
						<div class="col-md-6 p-5">
					   
							<div class="mb-3 row">
								<p class="text-center fs-4 fw-bold text-success"> Delivery Address </p>
								<hr>
								<div class="col p-1">
									<label class="mx-2">First Name</label>
								<input type="text" name="firstName" class="form-control">
								</div>
								
								<div class="col p-1">
									<label class="mx-2">Last Name</label>
								<input type="text" name="lastName" class="form-control">
								</div>
							</div>
							
							<div class="mb-3 row">
								<div class="col p-1">
									<label class="mx-2">Email</label>
								<input type="email" name="email"  class="form-control">
								</div>
								<div class="col p-1">
									<label class="mx-2">Mobile Number</label>
								<input type="text" name="mobileNo" class="form-control">
								</div>
							</div>
							
							<div class="mb-3 row">
								<div class="col p-1">
									<label class="mx-2">Address</label>
								<input type="text" name="address" class="form-control">
								</div>
								<div class="col p-1">
									<label class="mx-2">City</label>
								<input type="text" name="city" class="form-control">
								</div>
							</div>
							
							<div class="mb-3 row">
								<div class="col p-1">
									<label class="mx-2">State</label>
								<input type="text" name="state" class="form-control">
								</div>
								<div class="col p-1">
									<label class="mx-2">Pincode</label>
								<input type="number" name="pincode" class="form-control">
								</div>
							</div>
							
						
						</div>
						<div class="col-md-6 p-5">
							<p class="text-center fs-4 fw-bold text-success"> Payment Mode </p>
							<hr>
							<div class="card">
								<div class="card-body">
									<table class="table table-borderless">
										<tbody>
											<tr>
												<td>Total price</td>
												<td>:</td>
												<td>&#8377; [[${orderPrice}]]</td>
											</tr>
											<tr>
												<td>Delivery Fee</td>
												<td>:</td>
												<td>&#8377; 250</td>
											</tr>

											<tr>
												<td>Tax</td>
												<td>:</td>
												<td>&#8377; 100</td>
											</tr>

											<tr class="border-top">
												<td>Payment Price</td>
												<td>:</td>
												<td>&#8377; [[${totalOrderPrice}]]</td>
											</tr>
										</tbody>
									</table>
								</div>
							</div>
							
						  <div class="card shadow p-3 mb-5 mt-2 bg-body-tertiary rounded">
								
								<div class="card-body ">

										<div class="mb-3">
											<label class="form-label">Select payment Type</label>
											 <select class="form-control" name="paymentType">
												<option>--select--</option>
												<option value="COD">Cash on Delivery</option>
												<option value="ONLINE"> Online Payment</option>
											 </select>
										</div>

										<button class="btn bg-primary text-white col-md-12"> Place Order </button>
								
								</div>

							</div>
						</div>
						
					</div>
					</form>
				</div>
	</section>
    
</body>
</html>
