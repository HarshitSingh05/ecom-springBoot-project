<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
        th:replace="~{base::layout(~{::section})}">
<head>
    <title>Welcome Page</title>
</head>
<body>
	<section>
		<div class="container mt-5 p-5 bg-light">
			
					<div class="row">
						
						<div class="col-md-10 offset-md-1">
							
								<div class="card-body card-sh rounded-4">
									<p class="fs-3 text-center fw-bold"> Edit Profile </p>
									
									<th:block th:if="${session.succMsg}">
										<p class="text-success fw-bold text-center"> [[${session.succMsg}]]</p>
										<th:block th:text="${@commonServiceImple.removeSessionMessage()}"> </th:block>
									</th:block>
																	
									<th:block th:if="${session.errorMsg}">
										<p class="text-danger fw-bold text-center"> [[${session.errorMsg}]]</p>
										<th:block th:text="${@commonServiceImple.removeSessionMessage()}"> </th:block>
									</th:block>
									
									<hr>
									<div class="text-center">
										
									<img alt="Profile_Image" th:src="${user.profileImage}" class="border p-2"
									 style="width: 110px; height: 110px; border-radius: 50%;">
									 
									 </div>
									 
									 <div class="col-md-8 offset-md-2 mt-4">
										
									 <table class="table table-borderless">
									 
									   <tbody>
										<form action="/user/save-editProfile" method="post" enctype="multipart/form-data">
									     <tr>
											
									       <th scope="row"> Name </th>
										   <td>:</td>
									       <td><input type="text" name="fullName" class="form-control" th:value="${user.fullName}" placeholder="fullName"></td>
										   
									     </tr>
										 
										 
										 <tr>

										   <th scope="row"> Mobile Number </th>
										   <td>:</td>
										   <td><input type="text" name="mobileNumber" class="form-control" th:value="${user.mobileNumber}" placeholder="Mobile Number"></td>
										   
										 </tr>
										 
										 <tr>

										   <th scope="row"> Address </th>
										   <td>:</td>
										   <td><input type="text" name="address" class="form-control" th:value="${user.address}" placeholder="Address"></td>
										   
										 </tr>
										 
										 <tr>

										   <th scope="row"> State </th>
										   <td>:</td>
										   <td><input type="text" name="state" class="form-control" th:value="${user.state}" placeholder="State"></td>
										   
										 </tr>
										 
										 <tr>

										   <th scope="row"> City </th>
										   <td>:</td>
										   <td><input type="text" name="city" class="form-control" th:value="${user.city}" placeholder="City"> </td>
										   
										 </tr>
										 
										 <tr>

										   <th scope="row"> Pincode </th>
										   <td>:</td>
										   <td><input type="text" name="pincode" class="form-control" th:value="${user.pincode}" placeholder="Pincode">
										 <input type="hidden" th:value="${user.id}" name="id"></td>
										   
										 </tr>
										 
										 <tr>

										   <th scope="row"> Profile Image </th>
										   <td>:</td>
										   <td><input type="file" name="img" class="form-control"></td>
										   
										 </tr>											 
										 
										 <tr>

										   <th scope="row"></th>
										   <td> <button class="btn btn-danger"> Save </button></td>
										   <td></td>
										   
										 </tr>
										 
										 </form>
									   </tbody>
									 </table>
									 
									 </div>
									 
								</div>
							
						</div>
						
						<div class="col-md-10 offset-md-1 mt-4">
							
								<div class="card-body card-sh rounded-4">
									<p class="fs-3 text-center fw-bold"> Change Password </p>
									<hr>
									 
									 <div class="col-md-6 offset-md-3 mt-4">
										
									 <table class="table table-borderless">
									 
									   <tbody>
										<form action="/user/change-password" method="post">
									     <tr>
											
									       <th scope="row"> Current Password </th>
										   <td>:</td>
									       <td><input type="text" name="currentPassword" class="form-control" placeholder="Current Password"></td>
										   
									     </tr>
										 
										 
										 <tr>

										   <th scope="row"> New Password </th>
										   <td>:</td>
										   <td><input type="" name="newPassword" class="form-control" placeholder="New Password"></td>
										   
										 </tr>
										 
										 <tr>

										   <th scope="row"> Confirm Password </th>
										   <td>:</td>
										   <td><input type="" name="confirmPassword" class="form-control" placeholder="Confirm Password"></td>
										   
										 </tr>
										 							 
										 
										 <tr>

										   <th scope="row"></th>
										   <td> <button class="btn btn-danger"> Submit </button></td>
										   <td></td>
										   
										 </tr>
										 
										 </form>
									   </tbody>
									 </table>
									 
									 </div>
									 
								</div>
							
						</div>
					</div>
					
				</div>
	</section>
    
</body>
</html>
